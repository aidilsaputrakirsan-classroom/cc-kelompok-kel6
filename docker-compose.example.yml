services:
  # ==================== DATABASES ====================
  auth-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your-postgres-password
      POSTGRES_DB: auth_db
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    networks:
      - cloudnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 45s

  finance-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your-postgres-password
      POSTGRES_DB: finance_db
    volumes:
      - finance_db_data:/var/lib/postgresql/data
    networks:
      - cloudnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d finance_db"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 45s

  letter-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your-postgres-password
      POSTGRES_DB: letter_db
    volumes:
      - letter_db_data:/var/lib/postgresql/data
    networks:
      - cloudnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d letter_db"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 45s

  # ==================== BACKEND SERVICES ====================
  auth-service:
    build: ./services/auth-service
    restart: unless-stopped
    env_file:
      - ./services/auth-service/.env
    depends_on:
      auth-db:
        condition: service_healthy
    networks:
      - cloudnet
    expose:
      - "8000"
    entrypoint: sh -c "python seed.py && uvicorn main:app --host 0.0.0.0 --port 8000"

  finance-service:
    build: ./services/finance-service
    restart: unless-stopped
    env_file:
      - ./services/finance-service/.env
    depends_on:
      finance-db:
        condition: service_healthy
      auth-service:
        condition: service_started
    networks:
      - cloudnet
    expose:
      - "8000"
    entrypoint: sh -c "python seed.py && uvicorn main:app --host 0.0.0.0 --port 8000"

  letter-service:
    build: ./services/letter-service
    restart: unless-stopped
    env_file:
      - ./services/letter-service/.env
    depends_on:
      letter-db:
        condition: service_healthy
      auth-service:
        condition: service_started
    networks:
      - cloudnet
    expose:
      - "8000"
    entrypoint: sh -c "python seed.py && uvicorn main:app --host 0.0.0.0 --port 8000"

  # ==================== FRONTEND ====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - cloudnet
    expose:
      - "5173"

  # ==================== GATEWAY ====================
  gateway:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./services/gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth-service
      - finance-service
      - letter-service
      - frontend
    networks:
      - cloudnet

volumes:
  auth_db_data:
  finance_db_data:
  letter_db_data:

networks:
  cloudnet:
    name: cloudapp-network
    driver: bridge
